<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/css/__app__.css" />

    <script src="/js/invoke.js" defer></script>

    <script src="/js/__app__.js" defer></script>
    <script src="/js/__titlebar__.js" defer></script>

    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/styles.css" />

    <title>SampleVault — Audio Sample Manager</title>

    <script src="/js/waveform.js" defer></script>
    <script src="/js/sidebar.js" defer></script>
    <script src="/js/browse.js" defer></script>
  </head>
  <body>
    <div id="titlebar">
      <div id="titlebar_handle"></div>
      <div class="btn-group">
        <button onclick="minimize()">m</button>
        <button onclick="maximize()">M</button>
        <button onclick="closeWindow()">X</button>
      </div>
    </div>

    <div class="app">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-logo"><span>S</span>ampleVault</div>

        <div class="search-wrap">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <div class="tag-chip">VOCALS <span class="chip-x">×</span></div>
          <input type="text" placeholder="Search samples, tags, packs…" />
        </div>

        <button class="topbar-btn">Settings</button>
      </div>

      <div class="main">
        <!-- Sidebar -->
        <div class="sidebar">
          <div
            style="
              padding: 10px 8px 4px;
              display: flex;
              flex-direction: column;
              gap: 2px;
            "
          >
            <div class="nav-item active">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              </svg>
              Library
            </div>
            <div class="nav-item">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
              Favorites
            </div>
          </div>
          <div class="sidebar-divider"></div>
          <div class="sidebar-header">File Tree</div>
          <div class="sidebar-scroll"></div>
          <div style="padding: 8px; border-top: 1px solid var(--border)">
            <button
              style="
                width: 100%;
                background: var(--bg-surface);
                border: 1px dashed var(--border);
                color: var(--text-muted);
                border-radius: var(--radius);
                padding: 6px;
                font-size: 11px;
                cursor: pointer;
              "
            >
              + Add Folder
            </button>
          </div>
        </div>

        <!-- Center panel -->
        <div class="center">
          <div class="list-header">
            <div class="list-col">Name</div>
            <div class="list-col" style="text-align: right">Type</div>
            <div class="list-col" style="text-align: right">BPM</div>
            <div class="list-col" style="padding-left: 8px">Tags</div>
          </div>
          <div class="list-scroll"></div>
        </div>
      </div>

      <!-- Preview -->
      <div class="preview">
        <div class="preview-header">
          <span class="preview-fav">♡</span>
          <span class="preview-title">Cymatics 2 VOCAL_1 70 EDM.wav</span>
          <div class="preview-tags">
            <span class="preview-tag x">EDM ×</span>
            <span class="preview-tag x">VOCALS ×</span>
            <button class="add-tag">+ tag</button>
          </div>
        </div>
        <div class="preview-body">
          <div class="wave-area">
            <div class="wave-canvas-wrap">
              <canvas id="waveCanvas"></canvas>
              <div class="playhead"></div>
            </div>
          </div>
        </div>
        <div class="preview-controls">
          <button class="play-btn" id="playBtn">▶</button>
          <button class="play-btn" id="playBtn">▶</button>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bottombar">
        <div class="bb-item">
          <div class="bb-dot"></div>
          <span>1,269</span> samples
        </div>
        <div class="bb-sep"></div>
        <div class="bb-item">Playback mode: <span>Loop</span></div>
      </div>
    </div>
  </body>
</html>
