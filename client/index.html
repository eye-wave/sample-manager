<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/styles/__app__.scss" />

    <script src="/src/main.ts" type="module"></script>

    <link rel="stylesheet" href="/styles/theme.scss" />
    <link rel="stylesheet" href="/styles/styles.scss" />

    <title>SampleVault — Audio Sample Manager</title>
  </head>
  <body>
    <div id="titlebar">
      <div id="titlebar_handle"></div>
      <div class="btn-group">
        <button id="btn_minimize" type="button">
          <load src="assets/icons/minimize.svg" />
        </button>
        <button id="btn_maximize" type="button">
          <load src="assets/icons/maximize.svg" />
        </button>
        <button id="btn_closeWindow" type="button">
          <load src="assets/icons/close.svg" />
        </button>
      </div>
    </div>

    <div class="app">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-logo"><span>S</span>ampleVault</div>

        <div class="search-wrap">
          <load src="assets/icons/search.svg" />

          <div id="search_tags"></div>
          <input id="search" type="text" placeholder="Search samples, tags, packs…" />
        </div>

        <button class="topbar-btn" type="button">Settings</button>
      </div>

      <div class="main">
        <!-- Sidebar -->
        <div class="sidebar">
          <div style="padding:10px 8px 4px;display:flex;flex-direction:column;gap:2px">
            <div class="nav-item active">
              <load src="assets/icons/library.svg" />
              Library
            </div>
            <div class="nav-item">
              <load src="assets/icons/heart-hollow.svg" />
              Favorites
            </div>
          </div>
          <div class="sidebar-divider"></div>
          <div class="sidebar-header">File Tree</div>
          <div id="sidebar" class="sidebar-scroll"></div>
          <div style="padding:8px;border-top:1px solid var(--border)">
            <button id="add_folder" type="button">+ Add Folder</button>
          </div>
        </div>

        <!-- Center panel -->
        <div class="center">
          <div class="list-header">
            <div class="list-col">Name</div>
            <div class="list-col" style="text-align:right">Type</div>
            <div class="list-col" style="text-align:right">BPM</div>
            <div class="list-col" style="padding-left:8px">Tags</div>
          </div>
          <div id="list_scroll" class="list-scroll"></div>
        </div>
      </div>

      <!-- Preview -->
      <div class="preview">
        <div class="preview-header">
          <span class="preview-fav">♡</span>
          <span class="preview-title">Cymatics 2 VOCAL_1 70 EDM.wav</span>
          <div class="preview-tags">
            <span class="preview-tag x">EDM ×</span>
            <span class="preview-tag x">VOCALS ×</span>
            <button class="add-tag" type="button">+ tag</button>
          </div>
        </div>
        <div class="preview-body">
          <div class="wave-area">
            <div class="wave-canvas-wrap">
              <canvas id="waveCanvas"></canvas>
              <div class="playhead"></div>
            </div>
          </div>
        </div>
        <div class="preview-controls">
          <button class="play-btn" type="button" id="playBtn">▶</button>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bottombar">
        <div class="bb-item">
          <div class="bb-dot"></div>
          <span>1,269</span> samples
        </div>
        <div class="bb-sep"></div>
        <div class="bb-item">Playback mode: <span>Loop</span></div>
      </div>
    </div>
  </body>
</html>
