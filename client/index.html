<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script src="/src/main.ts" type="module"></script>

    <theme></theme>
    <link rel='stylesheet' href="/styles/__app__.scss" />
    <link rel='stylesheet' href="/styles/styles.scss" />

    <title>SampleVault — Audio Sample Manager</title>
  </head>
  <body>
    <div class="titlebar">
      <div style="flex:1"></div>
      <div class="btn-group">
        <button id="btn_minimize__">
          <load src="assets/icons/minimize.svg" />
        </button>
        <button id="btn_maximize__">
          <load src="assets/icons/maximize.svg" />
        </button>
        <button id="btn_closeWindow__">
          <load src="assets/icons/close.svg" />
        </button>
      </div>
    </div>

    <div class="app">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-logo"><span>S</span>ampleVault</div>

        <div class="search-wrap">
          <load src="assets/icons/search.svg" />

          <div id="search_tags__"></div>
          <input id="search__" placeholder="Search samples, tags, packs…" autocomplete="off" />
        </div>

        <button id="conf_btn__" class="topbar-btn"><load src="assets/icons/settings.svg" />Settings</button>

        <!-- Settings -->
        <dialog id="conf_dial__">
          <div class="dialog-shell">
            <div class="dialog" id="conf_dial_body__" role="dialog" aria-labelledby="settings-title">
              <div class="dialog-header">
                <p class="dialog-title">
                  <span class="dialog-title-icon">
                    <load src="assets/icons/settings.svg" />
                  </span>
                  Settings
                </p>
                <button id="dialog_close__" class="dialog-close-btn" aria-label="Close">
                  <load src="assets/icons/close.svg" />
                </button>
              </div>

              <div class="dialog-body">
                <div>
                  <button class="btn btn-surface" data-target="dial_tab_pref__">Preferences</button>
                  <button class="btn btn-surface" data-target="dial_tab_plug__">Plugins</button>
                </div>

                <div style="display:contents" id="dial_tab_pref__">
                  <p class="section-label">Preferences</p>
                  <div id="settings_body__" style="display:contents"></div>
                </div>

                <div style="display:none" id="dial_tab_plug__">
                  <p class="section-label">Plugins</p>
                  <section id="plugins_settings__"></section>
                </div>

                <div style="display:none" id="dial_tab_plugin__">
                  <p class="section-label" id="plugin_settings_label__"></p>
                  <div id="plugin_settings_body__" style="display:contents"></div>
                </div>
              </div>

              <div style="flex:1"></div>

              <div class="dialog-footer">
                <button id="conf_reset__" class="btn btn-ghost">Reset to defaults</button>
                <button id="conf_save__" class="btn btn-primary">Save changes</button>
              </div>
            </div>
          </div>
        </dialog>

      </div>

      <div class="main">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar_container__">
          <div style="padding:10px 8px 4px;display:flex;flex-direction:column;gap:2px">
            <input type="radio" name="tab" value="lib" id="tlib__" checked>
            <input type="radio" name="tab" value="fav" id="tfav__">
            <label class="nav-item" for="tlib__">
              <load src="assets/icons/library.svg" />
              Library
            </label>
            <label class="nav-item" for="tfav__">
              <load src="assets/icons/heart-hollow.svg" />
              Favorites
            </label>
          </div>
          <div class="sidebar-divider"></div>
          <div class="sidebar-header">File Tree</div>
          <div id="sidebar__" class="sidebar-scroll"></div>
          <div id="sidebar_plugins__" class="sidebar-scroll"></div>
          <div style="flex:1"></div>
          <div style="padding:8px;border-top:1px solid var(--border)">
            <button id="add_folder__" class="add-folder">+ Add Folder</button>
          </div>
          <div class="sidebar-resize" id="sidebar_resize__"></div>
        </div>

        <!-- Center panel -->
        <div class="center">
          <div class="list-header">
            <div class="list-col">Name</div>
            <div class="list-col" style="text-align:right">Type</div>
            <div class="list-col" style="text-align:right">BPM</div>
            <div class="list-col" style="padding-left:8px">Tags</div>
          </div>
          <div id="list_scroll__" class="list-scroll">
            <div id="pagination__" style="display:none">
              <button id="pagi_template__">1</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Preview -->
      <div class="preview">
        <div class="preview-header">
          <span id="preview_fav__" class="fav">♡</span>
          <span id="preview_label__" class="preview-title"></span>
          <div id="preview_tags__" class="tags"></div>
        </div>
        <div class="preview-body">
          <div id="waveform__" class="waveform"></div>
          <div id="wave_thumb__" class="wave-thumb"></div>
          <div class="controls">
            <div style="flex: 1"></div>
            <span id="time_cur__">00:00</span>
            <button class="topbar-btn" id="pause_btn__">
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></svg>
            </button>
            <span id="time_est__">00:00</span>
            <div style="flex: 1; display: flex; align-items: center; gap: 8px">
              <input
                class="volume"
                type="range"
                min="0"
                step="0.001"
                id="volume_ctrl__"
              />
              <span id="volume_txt__">100%</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bottombar">
        <div class="bb-item">
          <div class="bb-dot"></div>
          <span id="s_total__"></span> samples
        </div>
        <div class="bb-sep"></div>
        <div class="bb-item">Playback mode: <span>Loop</span></div>
      </div>
    </div>
  </body>
</html>
