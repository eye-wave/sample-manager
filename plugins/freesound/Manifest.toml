id          = "freesound-search"
name        = "Freesound"
description = "Search freesound.org for samples"
version     = "0.1.0"

[assets]
entry = "freesound_plugin.wasm"
icon = "icon.svg"

[capabilities]
storage           = true
encrypted_storage = true
network           = true

network_allowlist = [
    "freesound.org",
    "api.freesound.org",
]

[config_schema.api_key]
type = "string"
label = "API Key"
default = ""
is_password = true
